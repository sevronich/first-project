<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Grid Learn AI</title>

    <style>
        .container {
  display: grid;
  grid-template-columns: 250px 1fr 1fr; /* ៣ ជួរឈរ */
  gap: 10px;
}

.main-header {
  /* ឱ្យ Header ចាប់ផ្តើមពីបន្ទាត់ទី ១ ដល់ បន្ទាត់ទី ៤ (គ្របដណ្តប់ ៣ columns) */
  grid-column: 1 / 4; 
  background-color: #f1c40f;
}

.sidebar {
  /* ឱ្យ Sidebar នៅជួរឈរទី ១ */
  grid-column: 1 / 2;
  background-color: #3498db;
}

.content {
  /* ឱ្យ Main Content នៅជួរឈរទី ២ */
  grid-column: 2 / 3;
  background-color: #e74c3c;
}

.right {
  /* ឱ្យ Right Ads នៅជួរឈរទី ៣ */
  grid-column: 3 / 4;
  background-color: #2ecc71;
}

.main-footer {
  /* ឱ្យ Footer ចាប់ផ្តើមពីបន្ទាត់ទី ៣ ដល់ បន្ទាត់ទី ៦ (គ្របដណ្តប់ ៣ columns) */
  grid-column: 1 / 4;
  background-color: #9b59b6;
}
    </style>










</head>
<body>

<div class="container">
  <header class="main-header">Header</header>
  <aside class="sidebar">Sidebar</aside>
  <article class="content">Main Content</article>
  <aside class="right ads">Right Ads</aside>
  <footer class="main-footer">Footer</footer>
</div>















    
</body>
</html>
