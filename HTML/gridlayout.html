<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Layout</title>

    <style>
        .container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 10px;
            height: 100vh;
        }

        .box 
        {
            background-color: blue;
            border: 1px solid black;
            border-radius: 10%;
            text-align: center;
            color: white;
        }

        .box1{
            background-color: rgb(244, 6, 6);
        }
        .box2{
            background-color: rgba(244, 6, 6,0.9);
        }
        .box3{
            background-color: rgba(244, 6, 6 ,0.8);
        }
        .box4{
            background-color: rgba(244, 6, 6 ,0.7);
        }
        .box5{
            background-color: rgba(244, 6, 6 ,0.6);
        }
        .box6{
            background-color: rgba(244, 6, 6 ,0.5);
        }
        .box7{
            background-color: rgba(244, 6, 6 ,0.4);
        }
        .box8{
            background-color: rgba(244, 6, 6 ,0.3);
        }
        .box9{
            background-color: rgba(244, 6, 6 ,0.2);
        }


</style>

</head>
<body>



<div class="container">
    <div class="box box1">1</div>
    <div class="box box2">2</div>
    <div class="box box3">3</div>
    <div class="box box4">4</div>
    <div class="box box5">5</div>
    <div class="box box6">6</div>
    <div class="box box7">7</div>
    <div class="box box8">8</div>
    <div class="box box9">9</div>

</div>



































    
</body>
</html>
