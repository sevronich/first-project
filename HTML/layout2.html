<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>layout</title>

    <style>
      body {
        background-color: #ffffff;
      }
      .container {
        display:grid;
        gap: 10px;
       
        grid-template-rows:repeat(8,300px);
        grid-template-columns: repeat(4,300px);

       
        
    
      }
      .item {
        /* width: 300px;
        height: 200px; */
        border: 2px solid black;
        border-radius: 10%;
        text-align: center;
        color:#ffffff;
      
      
      }
      .item:hover {
          transform: scale(1.2);
          transition: 0.5s;
          animation-duration: 2s;
          cursor: pointer;
      }
      .item:nth-child(even) {
          /* height: 350px; */
      }
      .item1 {
        background-image: url(https://i.pinimg.com/736x/d2/9a/f7/d29af78be0d0b3f63c9b4e9faf876f90.jpg);
        background-size: cover;
        /* height: 320px; */
      }

      .item2 {
        background-image:url(https://i.pinimg.com/736x/77/95/5a/77955a6ef715c4b97d7cde8a6086e150.jpg) ;
        background-size: cover;
        /* height: 300px; */
      }
      .item3 {
        background-image:url(https://i.pinimg.com/736x/2e/ef/2c/2eef2ce7d22cfa835a7a89ed4838abdd.jpg);
        background-size: cover;
      }
      .item4 {
        background-image:url(https://i.pinimg.com/736x/96/52/4d/96524d05361e9de1723b0bf0adaac8ae.jpg) ;
        background-size: cover;
      }
      .item5 {
        background-image:url(https://i.pinimg.com/736x/18/65/a7/1865a7090a4b7d1ff2fe4ce8e042e7c2.jpg) ;
        background-size: cover;
      }

      
    </style>
    <link rel="stylesheet" href="../CSS/css responsive.css">
  </head>
  <body>
    <div class="container">
    
        <div class="item item1"></div>
        <div class="item item2"></div>
        <div class="item item3"></div>
        <div class="item item4"></div>
        <div class="item item5"></div>
        <div class="item item1"></div>
        <div class="item item2"></div>
        <div class="item item3"></div>
        <div class="item item4"></div>
        <div class="item item5"></div>
        <div class="item item1"></div>
        <div class="item item2"></div>
        <div class="item item3"></div>
        <div class="item item4"></div>
        <div class="item item5"></div>

        
      
    </div>
  </body>
</html>
